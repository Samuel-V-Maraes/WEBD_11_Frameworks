<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <style type="text/css">
        
    </style>

    <title>Trabalhando com Complementos</title>

</head>
<body>
    <div class="container">
        <div class="row">
            <!--
                CLASSES:
                    container -> crie uma estrutura de box centralizada e responciva á partir de rezulução 540px
                    row -> crie uma estrutura similar a de uma linha de uma tabela
                    col-md-4 -> crie uma estrutura similar a de uma coluna para a classe row edivide em colunas que vai de 1 a 12.
                    bg-info -> determina a cor do background 
                    text-start -> alinha o texto a esquerda (horizontal)
                    text-center -> alinha o texto ao centro (horizontal)
                    text-end -> alinha o texto a direita (horizontal)
            -->
            <div class="col-md-4 bg-info text-start">Texto alinhado a Esquerda</div>
            <div class="col-md-4 bg-warning text-center">Texto alinhado ao Centro</div>
            <div class="col-md-4 bg-success text-end">Texto alinhado a Direita</div>
        </div>
    </div>

</body>

</html>
