<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Atividade 1 - Form 1</title>
</head>
<body class="bg-light ">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 mx-auto ">
                <form class="border p-4 rounded">
                    <div class="mb-3">
                        <h1 class="text-center">Cadastrar</h1>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input class="form-control">
                    </div>
                    <div class="mb-3">
                        <label  class="form-label">Email</label>
                        <input type="email" class="form-control" id="email">
                    </div>
                    <div class="mb-3">
                        <label  class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cidade</label>
                        <select class="form-select" >
                            <option selected>São Paulo</option>
                            <option value="1">Jaguariúna</option>
                            <option value="2">Campinas</option>
                        </select>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="termos">
                        <label class="form-check-label" >Aceito os termos</label>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">Enviar</button>
                    </div>
                    
                </form>
</body>
</html>
